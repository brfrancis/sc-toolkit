<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}sc-toolkit{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="nav">
    <a class="nav-brand" href="/">sc-toolkit</a>
    <ul class="nav-links">
      <li><a href="/demo" {% if active == 'demo' %}class="active"{% endif %}>Interactive Demos</a></li>
      <li><a href="/uci"  {% if active == 'uci'  %}class="active"{% endif %}>Connected Use Case Network</a></li>
      <li><a href="/cdr"  {% if active == 'cdr'  %}class="active"{% endif %}>Production-representative POCs</a></li>
    </ul>
  </nav>
 
  {% block body_override %}
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  {% endblock %}
 
  {% block scripts %}{% endblock %}
</body>
</html>
